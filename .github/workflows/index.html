<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="aa.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script> 
     <script src="https://www.google.com/recaptcha/api.js" async defer></script> 
</head>
<body> 
    <center><fieldset style="width: 150px; border-radius: 100px;">
     <form action="#" id="formulario-contacto">
           <label for="nombre" id="">Nombre y Apellido</label>
           <br>
           <input type="text" name="nombre" required placeholder="Ejm:Juan Perez" id="a5">
           <br><br>
           <label for="email">Email</label>
           <br>
           <marquee behavior="slide" direction="right" loop="1" onmouseover="document.getElementById('d2').play"><input type="email" name="email" required placeholder="Ejm: aguanteBoca@riverplate.com" id="a4"></marquee>
           <br><br>
           <label for="asunto">Asunto</label>
           <br>
           <marquee behavior="scroll" direction="left" loop="15"><input type="text" name="asunto" required placeholder="Ejm: venta de coca" id="a3"></marquee>
           <br><br>
           <label for="mensaje" >Mensaje</label>
           <br>
           <textarea name="mensaje" id="a2" placeholder="Ingrese su mensaje aqui" maxlength="500" rows="10" cols="50"></textarea>
            <br>
            <div class="g-recaptcha" data-sitekey="6LdfNiUtAAAAAI2BrE3KgeUk_3pVEHB4jAvdGdnk"></div>
           <br>
           <button type="submit" id="a1">Enviar</button>
         <button type="reset">borrar</button>
<script>
 const clickSound = new Audio("boca.mp3");

 document.getElementById("a1").addEventListener("click", function () {
    clickSound.play();
 });
  var PUBLIC_KEY  = "_64W7mvikZefc3HyD";
    var SERVICE_ID  = "service_s4j3s3b";
    var TEMPLATE_ID = "template_f0qilek";

    emailjs.init(PUBLIC_KEY);

    document.getElementById("formulario-contacto").addEventListener("submit", function(e) {
      e.preventDefault();

      emailjs.sendForm(SERVICE_ID, TEMPLATE_ID, this)
        .then(function() {
          document.getElementById("mensaje-ok").style.display = "block";
          document.getElementById("mensaje-error").style.display = "none";
          document.getElementById("formulario-contacto").reset();
        }, function() {
          document.getElementById("mensaje-error").style.display = "block";
          document.getElementById("mensaje-ok").style.display = "none";
        });
    });
</script>
     </form>
     </fieldset></center>
</body>
</html>
